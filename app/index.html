<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="健康記録">
  <title>健康記録</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <span class="header-title">健康記録</span>
    <button id="settings-btn" class="icon-btn" aria-label="設定">⚙️</button>
  </header>

  <nav class="tab-bar">
    <button id="tab-input" class="tab-btn tab-active">入力</button>
    <button id="tab-chart" class="tab-btn">グラフ</button>
    <button id="tab-report" class="tab-btn">レポート</button>
  </nav>

  <!-- 入力タブ -->
  <main id="input-view">
    <section class="card">
      <label class="field">
        <span class="field-label">日付</span>
        <input type="date" id="date">
      </label>
      <div id="load-indicator" class="load-indicator hidden">読み込み中...</div>
    </section>

    <section class="card">
      <h2 class="section-title">体重・体脂肪</h2>
      <label class="field">
        <span class="field-label">体重 <span class="unit">kg</span></span>
        <input type="number" id="weight" step="0.1" placeholder="91.9" inputmode="decimal">
      </label>
      <label class="field">
        <span class="field-label">体脂肪率 <span class="unit">%</span></span>
        <input type="number" id="bodyfat" step="0.1" placeholder="32.4" inputmode="decimal">
      </label>
    </section>

    <section class="card">
      <h2 class="section-title">CPAP</h2>
      <div class="field">
        <span class="field-label">使用有無</span>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="cpap" value="on"> on</label>
          <label class="radio-label"><input type="radio" name="cpap" value="off"> off</label>
          <label class="radio-label"><input type="radio" name="cpap" value="" checked> 未記録</label>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">血圧（朝）</h2>
      <label class="field">
        <span class="field-label">1回目 <span class="unit">収縮期/拡張期/脈拍</span></span>
        <input type="text" id="am-bp1" placeholder="131/81/77" inputmode="text" autocomplete="off">
      </label>
      <label class="field">
        <span class="field-label">2回目</span>
        <input type="text" id="am-bp2" placeholder="133/87/74" inputmode="text" autocomplete="off">
      </label>
    </section>

    <section class="card">
      <h2 class="section-title">血圧（夜）</h2>
      <label class="field">
        <span class="field-label">1回目 <span class="unit">収縮期/拡張期/脈拍</span></span>
        <input type="text" id="pm-bp1" placeholder="122/81/72" inputmode="text" autocomplete="off">
      </label>
      <label class="field">
        <span class="field-label">2回目</span>
        <input type="text" id="pm-bp2" placeholder="120/80/70" inputmode="text" autocomplete="off">
      </label>
    </section>

    <section class="card">
      <h2 class="section-title">食事</h2>
      <label class="field">
        <span class="field-label">外食 <span class="unit">回</span></span>
        <input type="number" id="eating-out" min="0" max="3" step="1" placeholder="0" inputmode="numeric">
      </label>
      <div class="field">
        <span class="field-label">夜食</span>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="night-snack" value="あり"> あり</label>
          <label class="radio-label"><input type="radio" name="night-snack" value="なし"> なし</label>
        </div>
      </div>
      <div class="field">
        <span class="field-label">間食</span>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="snack" value="あり"> あり</label>
          <label class="radio-label"><input type="radio" name="snack" value="なし"> なし</label>
        </div>
      </div>
      <label class="field">
        <span class="field-label">朝食</span>
        <input type="text" id="breakfast" placeholder="なし">
      </label>
      <label class="field">
        <span class="field-label">昼食</span>
        <input type="text" id="lunch" placeholder="サラダ、鶏汁">
      </label>
      <label class="field">
        <span class="field-label">夕食</span>
        <input type="text" id="dinner" placeholder="白飯、納豆">
      </label>
      <label class="field">
        <span class="field-label">気づき</span>
        <input type="text" id="food-note" placeholder="任意">
      </label>
    </section>

    <section class="card">
      <h2 class="section-title">運動</h2>
      <label class="field">
        <span class="field-label">内容</span>
        <input type="text" id="exercise" placeholder="なし / ウォーキング30分">
      </label>
    </section>

    <div id="msg" class="msg hidden"></div>
    <button id="submit-btn" class="submit-btn">記録する</button>
    <button id="delete-btn" class="danger-btn" disabled>この日の記録を削除</button>
    <div class="bottom-space"></div>
  </main>

  <!-- グラフタブ -->
  <div id="chart-view" class="hidden">
    <div class="chart-controls">
      <span class="chart-control-label">期間</span>
      <button class="period-btn period-active" data-days="14">2週間</button>
      <button class="period-btn" data-days="30">1ヶ月</button>
      <button class="period-btn" data-days="0">全期間</button>
      <button id="chart-refresh-btn" class="chart-refresh-btn" title="データ再読み込み">↻</button>
    </div>

    <div id="chart-loading" class="chart-loading hidden">読み込み中...</div>

    <div class="chart-card">
      <h2 class="section-title">体重</h2>
      <div class="chart-container">
        <canvas id="weight-canvas"></canvas>
      </div>
    </div>

    <div class="chart-card">
      <h2 class="section-title">血圧（朝）</h2>
      <div class="chart-container">
        <canvas id="bp-canvas"></canvas>
      </div>
    </div>

    <div class="bottom-space"></div>
  </div>

  <!-- レポートタブ -->
  <div id="report-view" class="hidden">
    <section class="card">
      <h2 class="section-title">週次レビュー（手動生成）</h2>
      <p class="hint-text">通常は水曜夜の血圧記録で自動生成されます。入れ忘れた場合はここから今週分を生成できます。</p>
      <button id="weekly-report-btn" class="submit-btn">今週の週次レビューを生成</button>
    </section>

    <section class="card">
      <h2 class="section-title">カスタム期間レポート</h2>
      <p class="hint-text">任意の期間の集計レポートを作成します（週次レビューとは別に保存され、週次サイクルには影響しません）。</p>
      <label class="field">
        <span class="field-label">開始日</span>
        <input type="date" id="custom-start">
      </label>
      <label class="field">
        <span class="field-label">終了日</span>
        <input type="date" id="custom-end">
      </label>
      <button id="custom-report-btn" class="submit-btn">カスタムレポートを生成</button>
    </section>

    <div id="report-msg" class="msg hidden"></div>
    <div class="bottom-space"></div>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>設定</h2>
        <button id="close-settings-btn" class="icon-btn">✕</button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span class="field-label">GitHub Token</span>
          <input type="password" id="s-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
        </label>
        <p class="hint-text">
          GitHub → Settings → Developer settings →<br>
          Personal access tokens → スコープ: <code>repo</code>
        </p>
        <details>
          <summary class="details-summary">詳細設定</summary>
          <label class="field">
            <span class="field-label">Owner</span>
            <input type="text" id="s-owner">
          </label>
          <label class="field">
            <span class="field-label">Repository</span>
            <input type="text" id="s-repo">
          </label>
          <label class="field">
            <span class="field-label">Branch</span>
            <input type="text" id="s-branch">
          </label>
        </details>
        <button id="save-settings-btn" class="submit-btn">保存</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
