name: Health Report

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: health-report-push
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate reports
        env:
          TZ: Asia/Tokyo
        run: |
          python scripts/plot_weight.py
          python scripts/plot_blood_pressure.py
          python scripts/analyze_health.py
          python scripts/update_readme.py

      - name: Commit updated reports
        env:
          TZ: Asia/Tokyo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          n=0
          while true; do
            git add README.md reports/health_analysis.md reports/blood_pressure.png reports/weight.png
            if git diff --cached --quiet; then
              echo "No changes to commit"
              break
            fi

            git commit -m "Update health report [skip ci]"
            if git push; then
              break
            fi

            n=$((n+1))
            if [ "$n" -ge 5 ]; then
              echo "push failed after $n attempts"
              exit 1
            fi

            # 入力アプリ側のコミットが近接するとworkflowの実行も競合し、他方が
            # 僅差で先にpushすることがある。生成物同士をrebase/mergeすると
            # コンフリクトで空回りするだけなので、リベースはせず最新のmainを
            # 取り直してレポートを再生成してからやり直す。
            sleep $((n*3))
            git reset --hard HEAD~1
            git fetch origin main
            git reset --hard origin/main
            python scripts/plot_weight.py
            python scripts/plot_blood_pressure.py
            python scripts/analyze_health.py
            python scripts/update_readme.py
          done