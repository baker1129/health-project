name: Health Report

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install pandas matplotlib

      - name: Generate reports
        run: |
          python scripts/plot_weight.py
          python scripts/plot_blood_pressure.py
          python scripts/analyze_health.py
          python scripts/update_readme.py

      - name: Commit updated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md reports/health_analysis.md reports/blood_pressure.png reports/weight.png
          git commit -m "Update health report [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push